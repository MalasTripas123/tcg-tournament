<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCG Arena — Tournament Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:     #0e0e14;
      --bg-card:     #16161f;
      --bg-elevated: #1e1e2a;
      --bg-input:    #12121a;
      --border:      #2e2e42;
      --border-glow: #7c6af7;
      --accent:      #8b7cf6;
      --accent-dim:  #6c5ce7;
      --accent-glow: rgba(139,124,246,0.15);
      --text-primary:#f0eeff;
      --text-muted:  #9090b8;
      --text-hint:   #5a5a7a;
      --success:     #22c55e;
      --warning:     #f59e0b;
      --danger:      #ef4444;
      --gold:        #ffd700;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg-base); color: var(--text-primary); min-height: 100vh; margin: 0; display: flex; flex-direction: column; }
    h1, h2, h3, .font-display { font-family: 'Cinzel', serif; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg-base); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* HEADER */
    #app-header { background: rgba(14,14,20,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-link { color: var(--text-muted); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.05em; padding: 0.35rem 0.75rem; border-radius: 6px; transition: all 0.2s; cursor: pointer; text-transform: uppercase; }
    .nav-link:hover { color: var(--text-primary); background: rgba(139,124,246,0.1); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.55rem 1.25rem; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: var(--bg-base); border-color: var(--accent); }
    .btn-primary:hover:not(:disabled) { background: #a08df8; box-shadow: 0 0 20px var(--accent-glow); }
    .btn-outline { background: transparent; color: var(--accent); border-color: var(--border-glow); }
    .btn-outline:hover:not(:disabled) { background: var(--accent-glow); border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text-primary); background: var(--bg-elevated); }
    .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.1); }
    .btn-success { background: var(--success); color: #000; border-color: var(--success); }
    .btn-success:hover:not(:disabled) { background: #4ade80; }
    .btn-warning { background: var(--warning); color: #000; border-color: var(--warning); }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.8rem; }
    .btn-lg { padding: 0.75rem 1.75rem; font-size: 1rem; }
    .btn-icon { padding: 0.4rem; width: 2rem; height: 2rem; justify-content: center; }

    /* INPUTS */
    .input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 500; padding: 0.6rem 0.9rem; border-radius: 8px; width: 100%; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input::placeholder { color: var(--text-hint); }
    select.input { cursor: pointer; }

    /* CARDS */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .card-elevated { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .card-accent-left { border-left: 3px solid var(--accent); }
    .card-accent-gold  { border-left: 3px solid var(--gold); }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 20px; }
    .badge-purple { background: rgba(139,124,246,0.2); color: #c4b9ff; border: 1px solid rgba(139,124,246,0.3); }
    .badge-gold   { background: rgba(255,215,0,0.15);  color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
    .badge-green  { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .badge-red    { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .badge-gray   { background: rgba(144,144,184,0.15); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-orange { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }

    /* TABLE / STANDINGS */
    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--text-hint); letter-spacing: 0.1em; padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    .standings-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(46,46,66,0.5); font-size: 0.92rem; font-weight: 500; }
    .standings-table tr:hover td { background: rgba(139,124,246,0.04); }
    .standings-table tr.rank-1 td { color: #ffd700; }
    .standings-table tr.rank-2 td { color: #c0c0c0; }
    .standings-table tr.rank-3 td { color: #cd7f32; }

    /* TABLE POD */
    .table-pod { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .table-pod.pod-finished { border-color: rgba(139,124,246,0.4); }
    .table-pod-header { background: var(--bg-elevated); padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
    .table-pod-header h3 { font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.1em; color: var(--accent); margin: 0; }

    /* PLAYER ROW */
    .player-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1rem; border-bottom: 1px solid rgba(46,46,66,0.4); transition: background 0.15s; flex-wrap: wrap; }
    .player-row:last-child { border-bottom: none; }
    .player-row.eliminated { opacity: 0.4; }
    .player-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600; color: var(--accent); flex-shrink: 0; }

    /* SEARCH DROPDOWN */
    .search-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--bg-elevated); border: 1px solid var(--border-glow); border-radius: 8px; z-index: 200; max-height: 260px; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .search-dropdown-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1rem; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid rgba(46,46,66,0.4); }
    .search-dropdown-item:last-child { border-bottom: none; }
    .search-dropdown-item:hover { background: rgba(139,124,246,0.1); }
    .search-dropdown-empty { padding: 1rem; text-align: center; color: var(--text-hint); font-size: 0.9rem; }

    /* TIMER */
    .timer-display { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); }
    .timer-warning { color: var(--warning); }
    .timer-danger  { color: var(--danger); animation: pulse 1s infinite; }
    .stopwatch-display { font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* SCORE CONTROL */
    .score-control { display: flex; align-items: center; gap: 0.4rem; }
    .score-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; text-align: center; width: 58px; padding: 0.3rem; border-radius: 6px; outline: none; }
    .score-input:focus { border-color: var(--accent); }
    .score-btn { width: 26px; height: 26px; border-radius: 6px; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary); font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .score-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* PRIZE CARD */
    .prize-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 0.9rem; display: flex; align-items: center; gap: 0.75rem; }

    /* VIEWS */
    .view { display: none; }
    .view.active { display: block; }

    /* MODAL */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 16px; padding: 2rem; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; }

    /* TOAST */
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 500; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
    .toast { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.9rem; font-weight: 500; min-width: 240px; max-width: 360px; animation: slideIn 0.3s ease, fadeOut 0.4s ease 2.6s forwards; pointer-events: auto; }
    .toast.success { border-color: var(--success); color: #4ade80; }
    .toast.error   { border-color: var(--danger); color: #f87171; }
    .toast.info    { border-color: var(--accent); color: #c4b9ff; }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeOut { to{opacity:0;transform:translateX(20%)} }

    /* SECTION TITLE */
    .section-title { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.2em; color: var(--text-hint); text-transform: uppercase; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); display: block; }

    /* FADE IN */
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* RADIO / CHECKBOX labels */
    .result-option { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); transition: border-color 0.15s; }
    .result-option:hover { border-color: var(--border-glow); }
    .result-option input { accent-color: var(--accent); }

    /* DRAG & DROP */
    .player-row[draggable="true"] { cursor: grab; transition: opacity 0.15s, background 0.15s; }
    .player-row[draggable="true"]:hover { background: rgba(139,124,246,0.06); }
    .player-row.dragging { opacity: 0.35; }
    .player-row.drag-over-player { background: rgba(139,124,246,0.18) !important; border-top: 2px solid var(--accent); }
    .drop-zone {
      min-height: 36px; margin: 4px 8px 8px; border-radius: 8px;
      border: 2px dashed var(--border); display: flex; align-items: center;
      justify-content: center; transition: all 0.15s; cursor: pointer;
    }
    .drop-zone span { font-size: 0.75rem; color: var(--text-hint); letter-spacing: 0.05em; }
    .drop-zone.drop-zone-active { border-color: var(--accent); background: rgba(139,124,246,0.12); }
    .drop-zone.drop-zone-active span { color: var(--accent); }

    /* TABLA DE POSICIONES COMPACTA */
    .standings-table th { font-size: 0.68rem; padding: 0.45rem 0.5rem; white-space: nowrap; }
    .standings-table td { padding: 0.5rem 0.5rem; font-size: 0.82rem; }
    .standings-table .player-avatar { width: 20px; height: 20px; font-size: 0.52rem; }
    .standings-table .score-btn { width: 18px; height: 18px; font-size: 0.8rem; }
    .standings-table #gs-placeholder { min-width: 1.5rem; font-size: 0.88rem; }

    @media (max-width: 768px) {
      .card { padding: 1rem; }
      .modal { padding: 1.25rem; }
      .two-col { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header id="app-header">
  <div style="max-width:1200px;margin:0 auto;padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;gap:1rem;">
    <a class="nav-link" onclick="navigate('home')" style="font-family:'Cinzel',serif;color:var(--text-primary);font-size:1.05rem;font-weight:700;letter-spacing:0.1em;">
      <span style="color:var(--accent)">♦</span> TCG ARENA
    </a>
    <nav style="display:flex;align-items:center;gap:0.25rem;">
      <a class="nav-link" onclick="navigate('home')">Torneos</a>
      <div style="position:relative;">
        <input id="header-search" class="input" placeholder="Buscar torneo..." style="width:190px;padding:0.4rem 0.8rem;font-size:0.85rem;"
               oninput="handleHeaderSearch(this.value)" onblur="setTimeout(()=>hideHeaderSearch(),200)" />
        <div id="header-search-dropdown" class="search-dropdown" style="display:none;width:280px;"></div>
      </div>
    </nav>
    <div id="header-auth" style="display:flex;align-items:center;gap:0.5rem;"></div>
  </div>
</header>

<!-- MAIN -->
<main id="app-main" style="flex:1;max-width:1200px;margin:0 auto;padding:2rem 1.5rem;width:100%;">

  <!-- VIEW: HOME -->
  <div id="view-home" class="view">
    <div style="text-align:center;padding:2.5rem 0 3rem;">
      <span class="badge badge-purple" style="margin-bottom:1rem;">⚔ MVP v2.0</span>
      <h1 style="font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:0.05em;margin:0.75rem 0 1rem;line-height:1.1;">
        Gestiona tus<br /><span style="color:var(--accent)">Torneos TCG</span>
      </h1>
      <p style="color:var(--text-muted);font-size:1.05rem;max-width:460px;margin:0 auto 2rem;">Crea torneos, gestiona mesas, sigue el ranking en tiempo real.</p>
      <button class="btn btn-primary btn-lg" onclick="handleCreateTournament()">♦ Crear Torneo</button>
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.75rem;">
        <span class="section-title" style="margin:0;border:none;padding:0;">Torneos Públicos</span>
        <input id="home-filter" class="input" placeholder="Filtrar..." style="width:200px;padding:0.4rem 0.8rem;font-size:0.85rem;" oninput="filterTournaments(this.value)" />
      </div>
      <div id="tournaments-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1rem;"></div>
    </div>
  </div>

  <!-- VIEW: CREATE -->
  <div id="view-create" class="view">
    <div style="max-width:620px;margin:0 auto;">
      <button class="btn btn-ghost btn-sm" onclick="navigate('home')" style="margin-bottom:1.5rem;">← Volver</button>
      <h1 style="font-size:1.7rem;font-weight:700;margin:0 0 0.4rem;">Crear Torneo</h1>
      <p style="color:var(--text-muted);margin:0 0 2rem;">Configura los detalles de tu torneo.</p>
      <form id="create-form" onsubmit="submitCreateTournament(event)">
        <div style="margin-bottom:1.25rem;">
          <label class="section-title">Nombre del Torneo</label>
          <input id="t-name" class="input" type="text" placeholder="Ej: Torneo Semanal Dragon's Lair" required />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;" class="two-col">
          <div>
            <label class="section-title">Número de Rondas</label>
            <input id="t-rounds" class="input" type="number" min="1" max="20" value="3" required />
          </div>
          <div>
            <label class="section-title">Duración por Ronda (min)</label>
            <input id="t-duration" class="input" type="number" min="10" max="180" value="50" required />
          </div>
        </div>
        <div style="margin-bottom:1.25rem;">
          <label class="section-title">Visibilidad</label>
          <select id="t-visibility" class="input">
            <option value="public">Público — Cualquiera puede inscribirse</option>
            <option value="approval">Con aprobación — Los jugadores envían solicitud</option>
            <option value="private">Privado — Solo el organizador agrega jugadores</option>
          </select>
        </div>
        <div style="margin-bottom:1.5rem;">
          <label class="section-title" style="margin-bottom:0.75rem;">Premios (Opcional)</label>
          <div id="prizes-list" style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:0.75rem;"></div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
            <button type="button" class="btn btn-ghost btn-sm" onclick="addPrize('text')">+ Premio en texto</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="addPrize('card')">+ Carta como premio</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Crear Torneo →</button>
      </form>
    </div>
  </div>

  <!-- VIEW: LOBBY -->
  <div id="view-lobby" class="view">
    <div style="max-width:700px;margin:0 auto;">
      <button class="btn btn-ghost btn-sm" onclick="navigate('home')" style="margin-bottom:1.5rem;">← Inicio</button>
      <div id="lobby-header" style="margin-bottom:1.5rem;"></div>
      <!-- Buscador -->
      <div style="margin-bottom:1.5rem;">
        <label class="section-title">Agregar Jugadores</label>
        <div style="position:relative;">
          <input id="player-search" class="input" type="text" placeholder="Buscar jugador por nombre o usuario..."
                 oninput="handlePlayerSearch(this.value)" onblur="setTimeout(()=>hidePlayerSearch(),200)" autocomplete="off" />
          <div id="player-search-dropdown" class="search-dropdown" style="display:none;"></div>
        </div>
      </div>
      <!-- Solicitudes pendientes -->
      <div id="lobby-requests" style="margin-bottom:1rem;"></div>
      <!-- Lista jugadores -->
      <div>
        <label class="section-title">Jugadores Inscritos (<span id="lobby-player-count">0</span>)</label>
        <div id="lobby-players" style="display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem;"></div>
        <button id="btn-start-tournament" class="btn btn-primary" style="width:100%;" onclick="startTournament()">⚔ Iniciar Torneo</button>
      </div>
    </div>
  </div>

  <!-- VIEW: ORGANIZER -->
  <div id="view-organizer" class="view">
    <div id="organizer-content"></div>
  </div>

  <!-- VIEW: SPECTATOR -->
  <div id="view-spectator" class="view">
    <div id="spectator-content"></div>
  </div>

  <!-- VIEW: PROFILE -->
  <div id="view-profile" class="view">
    <div id="profile-content" style="max-width:800px;margin:0 auto;"></div>
  </div>

</main>

<!-- FOOTER -->
<footer style="background:var(--bg-card);border-top:1px solid var(--border);padding:1.25rem 1.5rem;">
  <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;">
    <span style="font-family:'Cinzel',serif;font-size:0.82rem;color:var(--text-hint);">♦ TCG Arena — Tournament Manager MVP</span>
    <div style="display:flex;gap:1.5rem;">
      <span style="font-size:0.78rem;color:var(--text-hint);">Commander-style pods</span>
      <span style="font-size:0.78rem;color:var(--text-hint);">v2.0.0</span>
    </div>
  </div>
</footer>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════════
const App = {
  currentUser: null,
  currentView: 'home',
  currentTournamentId: null,
  tournaments: [],
  prizes: [],
  timers: {}, // { id: intervalId }
};

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  await fetchCurrentUser();
  renderHeader();
  await loadTournaments();
  await resolveRoute(location.pathname);
}

// ═══════════════════════════════════════════════════════════════
// ROUTING — History API
// Esquema de URLs:
//   /                        → home
//   /tournament/:id          → torneo (org o espectador según sesión)
//   /lobby/:id               → lobby del organizador
//   /profile/:userId         → perfil de usuario
//   /create                  → crear torneo
// ═══════════════════════════════════════════════════════════════

async function resolveRoute(pathname) {
  const segments = pathname.replace(/^\//, '').split('/');
  const [section, id] = segments;

  if (!section || section === '') {
    _showView('home');
    loadTournaments();
    return;
  }

  if (section === 'create') {
    if (!App.currentUser) { showLoginModal(); navigate('home'); return; }
    App.prizes = [];
    document.getElementById('prizes-list').innerHTML = '';
    _showView('create');
    history.replaceState({ view: 'create' }, '', '/create');
    return;
  }

  if (section === 'profile' && id) {
    try {
      const data = await api('/auth/profile/' + id);
      renderProfileView(data);
      _showView('profile');
    } catch {
      toast('Perfil no encontrado', 'error');
      navigate('home');
    }
    return;
  }

  if ((section === 'tournament' || section === 'lobby' || section === 'organizer') && id) {
    App.currentTournamentId = id;
    try {
      const t = await api('/api/tournaments/' + id);
      _updateTournamentCache(t);
      const isOrg = App.currentUser && t.organizerId === App.currentUser.id;
      if (t.status === 'lobby' && isOrg) {
        renderLobby(t); _showView('lobby');
      } else if (isOrg) {
        renderOrganizerView(t); _showView('organizer');
      } else {
        renderSpectatorView(t); _showView('spectator');
      }
    } catch {
      toast('Torneo no encontrado', 'error');
      navigate('home');
    }
    return;
  }

  navigate('home');
}

// _showView: cambia la vista visible sin tocar history
// Usado internamente por resolveRoute (que ya gestionó history antes de llamarla)
function _showView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + view);
  if (el) { el.classList.add('active', 'fade-in'); setTimeout(() => el.classList.remove('fade-in'), 400); }
  App.currentView = view;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Botón atrás / adelante del navegador
window.addEventListener('popstate', () => resolveRoute(location.pathname));

// ═══════════════════════════════════════════════════════════════
// API HELPER
// ═══════════════════════════════════════════════════════════════
async function api(url, opts = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    credentials: 'same-origin',
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Error del servidor');
  return data;
}

// Copia un link absoluto al clipboard y muestra confirmación
function copyLink(path) {
  const url = location.origin + path;
  navigator.clipboard.writeText(url).then(() => {
    toast('Link copiado: ' + url, 'success');
  }).catch(() => {
    // Fallback para entornos sin clipboard API
    prompt('Copia este link:', url);
  });
}

// NAVEGACIÓN SPA
// ═══════════════════════════════════════════════════════════════
function navigate(view, id) {
  // Calcular la URL canónica para cada vista
  const urlMap = {
    home:      '/',
    create:    '/create',
    lobby:     id ? '/lobby/' + id : '/lobby',
    organizer: id ? '/organizer/' + id : '/organizer',
    spectator: id ? '/tournament/' + id : '/tournament',
    profile:   id ? '/profile/' + id : '/profile',
  };
  const url = urlMap[view] || '/';
  history.pushState({ view, id }, '', url);

  // Actualizar título de la pestaña
  const titles = {
    home: 'TCG Arena',
    create: 'Crear Torneo — TCG Arena',
    lobby: 'Lobby — TCG Arena',
    organizer: 'Organizar — TCG Arena',
    spectator: 'Torneo — TCG Arena',
    profile: 'Perfil — TCG Arena',
  };
  document.title = titles[view] || 'TCG Arena';

  _showView(view);
  if (id) App.currentTournamentId = id;
  if (view === 'home') loadTournaments();
}

// Player search in lobby
let _psTimeout;
function handlePlayerSearch(q) {
  clearTimeout(_psTimeout);
  if (q.length < 2) { hidePlayerSearch(); return; }
  _psTimeout = setTimeout(() => doSearchPlayers(q), 300);
}

async function doSearchPlayers(q) {
  try {
    const [results, t] = await Promise.all([
      api('/api/users/search?q=' + encodeURIComponent(q)),
      api('/api/tournaments/' + App.currentTournamentId),
    ]);
    const enrolled = t.players.map(p => p.userId);
    const dd = document.getElementById('player-search-dropdown');
    if (!results.length) {
      dd.innerHTML = `<div class="search-dropdown-empty">Sin resultados para "${escHtml(q)}"</div>`;
    } else {
      dd.innerHTML = results.map(u => {
        const already = enrolled.includes(u.id);
        return `<div class="search-dropdown-item" onclick="${already ? '' : `addPlayerToLobby('${u.id}','${escHtml(u.displayName)}')`}" style="${already ? 'opacity:0.5;cursor:default;' : ''}">
          <div class="player-avatar" style="width:28px;height:28px;font-size:0.6rem;">${initials(u.displayName)}</div>
          <div style="flex:1;">
            <div style="font-weight:600;font-size:0.9rem;">${escHtml(u.displayName)}</div>
            <div style="font-size:0.78rem;color:var(--text-muted);">@${escHtml(u.username)}</div>
          </div>
          ${already ? '<span class="badge badge-gray">Ya inscrito</span>' : '<span style="font-size:0.78rem;color:var(--accent);">+ Agregar</span>'}
        </div>`;
      }).join('');
    }
    dd.style.display = 'block';
  } catch {}
}

function hidePlayerSearch() { document.getElementById('player-search-dropdown').style.display = 'none'; }

async function addPlayerToLobby(userId, displayName) {

    const t = await api('/api/tournaments/' + App.currentTournamentId + '/players', { method: 'POST', body: { userId } });

async function removePlayerFromLobby(userId) {

          ${!isFinished && currentRound?.status === 'active' ? `

          ${!isFinished && currentRound?.status === 'pending' ? `

          <button class="btn btn-ghost btn-sm" onclick="refreshTournament()">↻</button>
        </div>
      </div>

      <!-- TIMER RONDA -->
      ${currentRound?.status === 'active' && currentRound.startTime ? `
        <div class="card" style="display:flex;align-items:center;gap:1.5rem;padding:1rem 1.5rem;flex-wrap:wrap;">
          <div>
            <div style="font-size:0.72rem;color:var(--text-hint);letter-spacing:0.1em;margin-bottom:0.25rem;">TIEMPO RESTANTE</div>
            <span id="round-timer-${currentRound.id}" class="timer-display"></span>
          </div>
          <div>
            <div style="font-size:0.72rem;color:var(--text-hint);letter-spacing:0.1em;margin-bottom:0.25rem;">TRANSCURRIDO</div>

        <!-- MESAS -->
        <div>
          <span class="section-title">
            ${currentRound ? 'Ronda ' + currentRound.number + ' — ' + (currentRound.status === 'pending' ? 'Preparación (ajusta mesas antes de iniciar)' : currentRound.status === 'active' ? 'En curso' : 'Finalizada') : 'Sin ronda activa'}
          </span>
          <div id="org-tables-container" style="display:flex;flex-direction:column;gap:1rem;">
            ${currentRound ? renderOrgTables(t, currentRound) : '<p style="color:var(--text-hint);">No hay rondas activas.</p>'}
          </div>
          ${t.rounds.filter(r=>r.status==='finished').length ? `
            <div style="margin-top:2rem;">
              <span class="section-title">Historial de Rondas</span>
              ${renderRoundHistory(t)}
            </div>` : ''}
        </div>

        <!-- STANDINGS + PREMIOS -->
        <div style="display:flex;flex-direction:column;gap:1rem;">
          <div class="card" id="standings-card">
            <span class="section-title">Tabla de Posiciones</span>
            ${renderStandings(t.players, t.id, true, t.rounds)}
          </div>
          ${t.prizes.length ? `
            <div class="card">
              <span class="section-title">Premios</span>
              <div style="display:flex;flex-direction:column;gap:0.5rem;">
                ${t.prizes.map(p => `<div class="prize-card">
                  ${p.imageUrl ? `<img src="${escHtml(p.imageUrl)}" style="width:28px;height:38px;object-fit:cover;border-radius:3px;" onerror="this.style.display='none'" />` : '🃏'}
                  <span style="font-size:0.88rem;">${escHtml(p.value)}</span>
                </div>`).join('')}
              </div>

        </div>

  // Arrancar timers si hay ronda activa
  if (currentRound?.status === 'active' && currentRound.startTime) {
    startCountdown('round-timer-' + currentRound.id, currentRound.startTime, t.roundDuration);
    startStopwatch('round-elapsed-' + currentRound.id, currentRound.startTime);
    for (const tbl of currentRound.tables) {
      if (tbl.startTime && tbl.status !== 'finished') {
        startStopwatch('sw-' + tbl.id, tbl.startTime);
      }
    }
  }
}

function renderOrgTables(t, round) {
  if (!round.tables.length) return '<p style="color:var(--text-hint);">Sin mesas configuradas.</p>';
  const isPending = round.status === 'pending';
  return round.tables.map(table => {
    const finished = table.status === 'finished';
    const resultBadge = finished ? (
      table.result === 'winner' ? `<span class="badge badge-gold">🏆 ${escHtml(table.winner?.displayName || '?')}</span>` :
      table.result === 'draw'   ? `<span class="badge badge-orange">⚖ Empate</span>` :
      `<span class="badge badge-gray">Sin ganador</span>`
    ) : '';
    return `
    <div class="table-pod ${finished ? 'pod-finished' : ''}" id="pod-${table.id}">
      <div class="table-pod-header">
        <h3>Mesa ${table.id.replace('t','')}</h3>
        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
          ${resultBadge}
          ${isPending ? '<span style="font-size:0.72rem;color:var(--text-hint);letter-spacing:0.05em;">⠿ arrastra</span>' : ''}
          ${!finished && round.status === 'active' && table.startTime ? `<span id="sw-${table.id}" class="stopwatch-display"></span>` : ''}
          ${!finished && round.status !== 'finished' ? `
            <button class="btn btn-outline btn-sm" onclick="openFinishTableModal('${t.id}','${round.id}','${table.id}')">
              Terminar Mesa
            </button>` : ''}
        </div>
      </div>
      ${table.players.map((p,pi) => `
        <div class="player-row ${p.eliminated ? 'eliminated' : ''}"
             id="pr-${table.id}-${p.userId}"
             ${isPending ? `draggable="true"
               ondragstart="onDragStart(event,'${table.id}','${p.userId}')"
               ondragend="onDragEnd(event)"
               ondragover="onDragOverPlayer(event)"
               ondragleave="event.currentTarget.classList.remove('drag-over-player')"
               ondrop="onDropToPlayer(event,'${t.id}','${round.id}','${table.id}','${p.userId}')"` : ''}>
          ${isPending ? '<span style="cursor:grab;color:var(--text-hint);margin-right:2px;font-size:1rem;line-height:1;">⠿</span>' : ''}
          <div class="player-avatar">${initials(p.displayName)}</div>
          <span style="flex:1;font-weight:600;font-size:0.92rem;">${escHtml(p.displayName)}</span>
          ${!finished && (round.status === 'active' || round.status === 'pending') ? `
            <div class="score-control">
              <button class="score-btn" onclick="adjustScore('${t.id}','${round.id}','${table.id}','${p.userId}',-1)">−</button>
              <input type="number" class="score-input" value="${p.score||0}" min="0"
                     onchange="setScore('${t.id}','${round.id}','${table.id}','${p.userId}',this.value)" />
              <button class="score-btn" onclick="adjustScore('${t.id}','${round.id}','${table.id}','${p.userId}',1)">+</button>
            </div>
            <button class="btn btn-sm ${p.eliminated?'btn-ghost':'btn-danger'}"
                    onclick="toggleEliminate('${t.id}','${round.id}','${table.id}','${p.userId}',${!p.eliminated})">
              ${p.eliminated ? '↩' : '✕'}
            </button>` :
          `<span style="font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;color:var(--accent);">${p.score||0}</span>`}
        </div>`).join('')}
      ${isPending ? `
        <div class="drop-zone"
             ondragover="onDragOverZone(event)"
             ondragleave="onDragLeaveZone(event)"
             ondrop="onDropToZone(event,'${t.id}','${round.id}','${table.id}')">
          <span>Soltar aquí</span>
        </div>` : ''}
    </div>`;
  }).join('');
}

// ─── DRAG & DROP ─────────────────────────────────────────────────
// Estrategia: usamos solo dos eventos de destino:
//   1. onDragOverPlayer / onDropToPlayer: soltar SOBRE un jugador específico
//   2. onDropToZone: soltar en la zona vacía al final de una mesa
// El pod completo NO tiene handler de drop para evitar disparos erráticos.

const _drag = { tableId: null, userId: null };

function onDragStart(event, tableId, userId) {
  _drag.tableId = tableId;
  _drag.userId  = userId;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', userId);
  // Marcar el elemento arrastrado visualmente con un pequeño delay
  // para que el "ghost" del navegador se capture antes del cambio de estilo
  requestAnimationFrame(() => {
    const el = document.getElementById('pr-' + tableId + '-' + userId);
    if (el) el.classList.add('dragging');
  });
}

function onDragEnd(event) {
  // Limpiar todos los estilos de arrastre
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over-player').forEach(el => el.classList.remove('drag-over-player'));
  document.querySelectorAll('.drop-zone-active').forEach(el => el.classList.remove('drop-zone-active'));
}

function onDragOverPlayer(event) {
  event.preventDefault();
  event.stopPropagation();
  event.dataTransfer.dropEffect = 'move';
  // Resaltar solo este player-row
  document.querySelectorAll('.drag-over-player').forEach(el => el.classList.remove('drag-over-player'));
  event.currentTarget.classList.add('drag-over-player');
}

function onDragOverZone(event) {
  event.preventDefault();
  event.stopPropagation();
  event.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.drop-zone-active').forEach(el => el.classList.remove('drop-zone-active'));
  event.currentTarget.classList.add('drop-zone-active');
}

function onDragLeaveZone(event) {
  event.currentTarget.classList.remove('drop-zone-active');
}

// Soltar SOBRE un jugador → insertar antes de ese jugador
async function onDropToPlayer(event, tid, rid, targetTableId, targetUserId) {
  event.preventDefault();
  event.stopPropagation();
  onDragEnd();

  const { tableId: srcTableId, userId: srcUserId } = _drag;
  if (!srcUserId || srcUserId === targetUserId) return;

  const t = App.tournaments.find(tt => tt.id === tid);
  const round = t?.rounds.find(r => r.id === rid);
  if (!round) return;

  const srcTable = round.tables.find(tb => tb.id === srcTableId);
  const dstTable = round.tables.find(tb => tb.id === targetTableId);
  if (!srcTable || !dstTable) return;

  // Sacar jugador del origen
  const srcIdx = srcTable.players.findIndex(p => p.userId === srcUserId);
  if (srcIdx === -1) return;
  const [player] = srcTable.players.splice(srcIdx, 1);

  // Insertar antes del jugador destino
  const dstIdx = dstTable.players.findIndex(p => p.userId === targetUserId);
  const insertAt = dstIdx === -1 ? dstTable.players.length : dstIdx;
  dstTable.players.splice(insertAt, 0, player);

  await _persistTables(tid, rid, round);
}

// Soltar en la ZONA VACÍA al final de una mesa
async function onDropToZone(event, tid, rid, targetTableId) {
  event.preventDefault();
  event.stopPropagation();
  onDragEnd();

  const { tableId: srcTableId, userId: srcUserId } = _drag;
  if (!srcUserId) return;

  // Si es la misma mesa, simplemente mover al final
  const t = App.tournaments.find(tt => tt.id === tid);
  const round = t?.rounds.find(r => r.id === rid);
  if (!round) return;

  const srcTable = round.tables.find(tb => tb.id === srcTableId);
  const dstTable = round.tables.find(tb => tb.id === targetTableId);
  if (!srcTable || !dstTable) return;

  const srcIdx = srcTable.players.findIndex(p => p.userId === srcUserId);
  if (srcIdx === -1) return;
  const [player] = srcTable.players.splice(srcIdx, 1);
  dstTable.players.push(player);

  await _persistTables(tid, rid, round);
}

async function _persistTables(tid, rid, round) {
  try {
    const t = await api('/api/tournaments/' + tid + '/rounds/' + rid + '/tables', {
      method: 'PUT',
      body: { tables: round.tables },
    });
    _updateTournamentCache(t);
    // Re-renderizar solo las mesas sin perder timers
    const container = document.getElementById('org-tables-container');
    if (container) {
      const updatedRound = t.rounds.find(r => r.id === rid);
      if (updatedRound) container.innerHTML = renderOrgTables(t, updatedRound);
    }
  } catch(e) { toast('Error al guardar mesas: ' + e.message, 'error'); }
}

// ─── SCORE MANAGEMENT ────────────────────────────────────────
async function adjustScore(tid, rid, tableId, userId, delta) {
  const t = App.tournaments.find(tt => tt.id === tid);
  const round = t?.rounds.find(r => r.id === rid);
  const table = round?.tables.find(tb => tb.id === tableId);
  const player = table?.players.find(p => p.userId === userId);
  if (!player) return;
  await setScoreAPI(tid, rid, tableId, userId, Math.max(0, (player.score||0) + delta));
}

async function setScore(tid, rid, tableId, userId, val) {
  await setScoreAPI(tid, rid, tableId, userId, Math.max(0, parseInt(val)||0));
}

async function setScoreAPI(tid, rid, tableId, userId, score) {
  try {
    const t = await api('/api/tournaments/' + tid + '/rounds/' + rid + '/tables/' + tableId + '/players/' + userId, { method: 'PATCH', body: { score } });
    _updateTournamentCache(t);
    // Actualizar el input en DOM directamente para no re-renderizar todo
    const round = t.rounds.find(r => r.id === rid);
    const table = round?.tables.find(tb => tb.id === tableId);
    const player = table?.players.find(p => p.userId === userId);
    if (player) {
      const inputs = document.querySelectorAll('#pod-' + tableId + ' .score-input');
      inputs.forEach(inp => { if (inp.closest('.player-row')?.querySelector('[onclick*="' + userId + '"]')) inp.value = player.score; });
    }
    refreshStandingsCard(t);
  } catch(e) { toast(e.message, 'error'); }
}

async function toggleEliminate(tid, rid, tableId, userId, eliminated) {
  try {
    const t = await api('/api/tournaments/' + tid + '/rounds/' + rid + '/tables/' + tableId + '/players/' + userId, { method: 'PATCH', body: { eliminated } });
    _updateTournamentCache(t); renderOrganizerView(t);
    toast(eliminated ? 'Jugador eliminado de la mesa' : 'Jugador restaurado', 'info');
  } catch(e) { toast(e.message, 'error'); }
}

// Global score adjustment desde standings
async function adjustGlobalScore(tid, userId, delta) {
  const t = App.tournaments.find(tt => tt.id === tid);
  if (!t) return;
  const player = t.players.find(p => p.userId === userId);
  if (!player) return;
  const newScore = Math.max(0, (player.score||0) + delta);
  // Optimistic update
  player.score = newScore;
  const el = document.getElementById('gs-' + userId);
  if (el) el.textContent = newScore;
  try {
    const updated = await api('/api/tournaments/' + tid + '/players/' + userId + '/score', { method: 'PATCH', body: { score: newScore } });
    _updateTournamentCache(updated);
  } catch(e) { toast('Error al guardar score', 'error'); }
}

function refreshStandingsCard(t) {
  const card = document.getElementById('standings-card');
  if (card) card.innerHTML = '<span class="section-title">Tabla de Posiciones</span>' + renderStandings(t.players, t.id, true, t.rounds);
}

// ─── FINISH TABLE MODAL ───────────────────────────────────────
function openFinishTableModal(tid, rid, tableId) {
  const t = App.tournaments.find(tt => tt.id === tid);
  const round = t?.rounds.find(r => r.id === rid);
  const table = round?.tables.find(tb => tb.id === tableId);
  if (!table) return;
  const activePlayers = table.players.filter(p => !p.eliminated);
  window._finishTableCtx = { tid, rid, tableId, table };

  showModal(`
    <h2 style="font-size:1.2rem;font-weight:700;margin:0 0 0.25rem;">Terminar Mesa ${tableId.replace('t','')}</h2>
    <p style="color:var(--text-muted);font-size:0.85rem;margin:0 0 1.5rem;">Revisa los puntos y asigna el resultado.</p>
    <span class="section-title">Puntos finales</span>
    <div style="margin-bottom:1.25rem;">
      ${table.players.map(p => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border);">
          <span style="font-size:0.9rem;font-weight:600;${p.eliminated?'opacity:0.4;text-decoration:line-through;':''}">${escHtml(p.displayName)}</span>
          <div class="score-control">
            <button class="score-btn" onclick="adjustModalScore('${tableId}','${p.userId}',-1)">−</button>
            <input type="number" id="ft-${tableId}-${p.userId}" value="${p.score||0}" min="0" class="score-input" />
            <button class="score-btn" onclick="adjustModalScore('${tableId}','${p.userId}',1)">+</button>
          </div>
        </div>`).join('')}
    </div>
    <span class="section-title">Resultado de la mesa</span>
    <div style="display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem;">
      <label class="result-option"><input type="radio" name="tresult" value="none" checked /> Sin ganador asignado</label>
      ${activePlayers.map(p => `
        <label class="result-option">
          <input type="radio" name="tresult" value="winner-${p.userId}" />
          🏆 Ganador: <strong>${escHtml(p.displayName)}</strong>
        </label>`).join('')}
      <label class="result-option"><input type="radio" name="tresult" value="draw" /> ⚖ Empate</label>
      <div id="draw-selector" style="display:none;flex-wrap:wrap;gap:0.5rem;padding:0.5rem;background:var(--bg-elevated);border-radius:6px;">
        ${activePlayers.map(p => `
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;">
            <input type="checkbox" name="draw-p" value="${p.userId}" style="accent-color:var(--accent);" /> ${escHtml(p.displayName)}
          </label>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal()">← Volver</button>
      <button class="btn btn-primary" style="flex:1;" onclick="doFinishTable()">Cerrar Mesa</button>
    </div>`);

  document.querySelectorAll('input[name="tresult"]').forEach(r => {
    r.addEventListener('change', () => {
      document.getElementById('draw-selector').style.display = r.value === 'draw' ? 'flex' : 'none';
    });
  });
}

function adjustModalScore(tableId, userId, delta) {
  const inp = document.getElementById('ft-' + tableId + '-' + userId);
  if (inp) inp.value = Math.max(0, parseInt(inp.value||0) + delta);
}

async function doFinishTable() {
  const { tid, rid, tableId, table } = window._finishTableCtx;
  const players = table.players.map(p => {
    const inp = document.getElementById('ft-' + tableId + '-' + p.userId);
    return { ...p, score: inp ? Math.max(0, parseInt(inp.value)||0) : p.score };
  });
  const sel = document.querySelector('input[name="tresult"]:checked')?.value || 'none';
  let result = 'none', winnerUserId = null, drawUserIds = [];
  if (sel.startsWith('winner-')) { result = 'winner'; winnerUserId = sel.replace('winner-', ''); }
  else if (sel === 'draw') { result = 'draw'; drawUserIds = [...document.querySelectorAll('input[name="draw-p"]:checked')].map(cb => cb.value); }

  try {
    const t = await api('/api/tournaments/' + tid + '/rounds/' + rid + '/tables/' + tableId + '/finish', {
      method: 'POST', body: { players, result, winnerUserId, drawUserIds }
    });
    _updateTournamentCache(t); closeModal();
    toast('Mesa cerrada', 'success');
    renderOrganizerView(t);
  } catch(e) { toast(e.message, 'error'); }
}

// ─── FINISH ROUND MODAL ───────────────────────────────────────
function openFinishRoundModal(tid, rid) {
  const t = App.tournaments.find(tt => tt.id === tid);
  const round = t?.rounds.find(r => r.id === rid);
  if (!round) return;
  window._finishRoundCtx = { tid, rid, round };

  const tablesHtml = round.tables.map(table => `
    <div style="margin-bottom:1rem;">
      <span class="section-title">Mesa ${table.id.replace('t','')} ${table.status==='finished'?'<span class="badge badge-purple">Ya cerrada</span>':''}</span>
      ${table.status === 'finished'
        ? `<p style="font-size:0.85rem;color:var(--text-hint);margin:0;">Esta mesa ya fue cerrada.</p>`
        : table.players.map(p => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border);">
            <span style="font-size:0.88rem;font-weight:600;">${escHtml(p.displayName)}</span>
            <div class="score-control">
              <button class="score-btn" onclick="adjustRoundModalScore('${table.id}','${p.userId}',-1)">−</button>
              <input type="number" id="rm-${table.id}-${p.userId}" value="${p.score||0}" min="0" class="score-input" />
              <button class="score-btn" onclick="adjustRoundModalScore('${table.id}','${p.userId}',1)">+</button>
            </div>
          </div>`).join('')}
    </div>`).join('');

  showModal(`
    <h2 style="font-size:1.2rem;font-weight:700;margin:0 0 0.25rem;">Terminar Ronda ${round.number}</h2>
    <p style="color:var(--text-muted);font-size:0.85rem;margin:0 0 1.25rem;">
      Se cerrarán todas las mesas abiertas. Los ganadores se asignarán automáticamente por score.
    </p>
    <div style="max-height:50vh;overflow-y:auto;margin-bottom:1.5rem;">${tablesHtml}</div>
    <div style="display:flex;gap:0.75rem;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal()">← Volver</button>
      <button class="btn btn-warning" style="flex:1;" onclick="doFinishRound()">⏹ Concluir Ronda</button>
    </div>`);
}

function adjustRoundModalScore(tableId, userId, delta) {
  const inp = document.getElementById('rm-' + tableId + '-' + userId);
  if (inp) inp.value = Math.max(0, parseInt(inp.value||0) + delta);
}

async function doFinishRound() {
  const { tid, rid, round } = window._finishRoundCtx;
  const tables = round.tables.map(table => ({
    ...table,
    players: table.status === 'finished' ? table.players : table.players.map(p => {
      const inp = document.getElementById('rm-' + table.id + '-' + p.userId);
      return { ...p, score: inp ? Math.max(0, parseInt(inp.value)||0) : p.score };
    })
  }));
  try {
    const t = await api('/api/tournaments/' + tid + '/rounds/' + rid + '/finish', { method: 'POST', body: { tables } });
    _updateTournamentCache(t); closeModal(); stopAllTimers();
    toast('Ronda ' + round.number + ' finalizada', 'success');
    renderOrganizerView(t);
  } catch(e) { toast(e.message, 'error'); }
}

async function activateRound(tid, rid) {
  try {
    const t = await api('/api/tournaments/' + tid + '/rounds/' + rid + '/activate', { method: 'POST' });
    _updateTournamentCache(t); toast('Ronda iniciada', 'success'); renderOrganizerView(t);
  } catch(e) { toast(e.message, 'error'); }
}

async function refreshTournament() {
  try {
    const t = await api('/api/tournaments/' + App.currentTournamentId);
    _updateTournamentCache(t);
    const isOrg = App.currentUser && t.organizerId === App.currentUser.id;
    if (isOrg) renderOrganizerView(t); else renderSpectatorView(t);
  } catch(e) { toast(e.message, 'error'); }

async function selfEnroll(tournamentId) {
  if (!App.currentUser) { toast('Debes iniciar sesión', 'error'); showLoginModal(); return; }

// ═══════════════════════════════════════════════════════════════
// STANDINGS
// ═══════════════════════════════════════════════════════════════
// Calcula el OW% (Opponent Win Percentage) de un jugador.
// OW% = promedio del win rate de cada oponente que se ha enfrentado.
// Win rate de un oponente = sus victorias / sus partidas totales jugadas.
// Si no hay datos suficientes devuelve null (se muestra como "—").
function calcOWP(player, allPlayers, rounds) {
  // Recopilar todos los oponentes con los que se ha sentado
  const opponentIds = new Set();
  for (const round of rounds) {
    if (round.status !== 'finished') continue;
    for (const table of round.tables) {
      const inTable = table.players.some(p => p.userId === player.userId);
      if (!inTable) continue;
      for (const p of table.players) {
        if (p.userId !== player.userId) opponentIds.add(p.userId);
      }
    }
  }
  if (!opponentIds.size) return null;

  const rates = [];
  for (const oid of opponentIds) {
    const opp = allPlayers.find(p => p.userId === oid);
    if (!opp) continue;
    const total = (opp.wins || 0) + (opp.losses || 0) + (opp.draws || 0);
    if (total === 0) continue;
    // Win rate del oponente; los empates cuentan 0.5
    const wr = ((opp.wins || 0) + (opp.draws || 0) * 0.5) / total;
    rates.push(wr);
  }
  if (!rates.length) return null;
  return rates.reduce((s, r) => s + r, 0) / rates.length;
}

function renderStandings(players, tid, editable, rounds) {
  if (!players.length) return '<p style="color:var(--text-hint);text-align:center;padding:1rem 0;font-size:0.9rem;">Sin jugadores.</p>';
  rounds = rounds || [];

  // Calcular OW% para cada jugador antes de ordenar
  const withOwp = players.map(p => ({
    ...p,
    owp: calcOWP(p, players, rounds),
  }));

  // Ordenar: Pts DESC → Victorias DESC → OW% DESC
  const sorted = withOwp.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    if ((b.wins||0) !== (a.wins||0)) return (b.wins||0) - (a.wins||0);
    if (b.owp !== null && a.owp !== null) return b.owp - a.owp;
    return 0;
  });

  const icons = ['🥇','🥈','🥉'];
  const fmtOwp = (v) => v === null ? '—' : (v * 100).toFixed(1) + '%';

  return `<table class="standings-table">
    <thead><tr>
      <th style="width:1.8rem;">#</th>
      <th>Jugador</th>
      <th style="text-align:right;" title="Puntos totales">Pts</th>
      <th style="text-align:right;" title="Victorias">V</th>
      <th style="text-align:right;" title="Empates">E</th>
      <th style="text-align:right;" title="Opponent Win Percentage — desempate estándar TCG">OW%</th>
    </tr></thead>
    <tbody>
      ${sorted.map((p,i) => `
        <tr class="${i<3?'rank-'+(i+1):''}">
          <td style="font-family:'Cinzel',serif;font-size:0.82rem;">${icons[i]||i+1}</td>
          <td style="max-width:120px;">
            <div style="display:flex;align-items:center;gap:0.4rem;">
              <div class="player-avatar" style="width:20px;height:20px;font-size:0.5rem;flex-shrink:0;">${initials(p.displayName)}</div>
              <span style="font-size:0.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(p.displayName)}</span>
            </div>
          </td>
          <td style="text-align:right;">
            ${editable ? `
              <div style="display:flex;align-items:center;justify-content:flex-end;gap:0.15rem;">
                <button class="score-btn" style="width:16px;height:16px;font-size:0.75rem;border-radius:3px;" onclick="adjustGlobalScore('${tid}','${p.userId}',-1)">−</button>
                <span id="gs-${p.userId}" style="font-family:'Cinzel',serif;font-weight:700;font-size:0.88rem;min-width:1.5rem;text-align:center;">${p.score||0}</span>
                <button class="score-btn" style="width:16px;height:16px;font-size:0.75rem;border-radius:3px;" onclick="adjustGlobalScore('${tid}','${p.userId}',1)">+</button>
              </div>` :
              `<span style="font-family:'Cinzel',serif;font-weight:700;font-size:0.88rem;">${p.score||0}</span>`}
          </td>
          <td style="text-align:right;font-size:0.82rem;color:var(--text-muted);">${p.wins||0}</td>
          <td style="text-align:right;font-size:0.82rem;color:var(--text-muted);">${p.draws||0}</td>
          <td style="text-align:right;font-size:0.78rem;color:var(--text-hint);" title="OW%: ${fmtOwp(p.owp)}">${fmtOwp(p.owp)}</td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

// TIMERS
// ═══════════════════════════════════════════════════════════════
function startCountdown(elId, startTime, durationMinutes) {
  const total = durationMinutes * 60000;
  const tick = () => {
    const el = document.getElementById(elId);
    if (!el) { clearInterval(App.timers[elId]); return; }
    const rem = total - (Date.now() - startTime);
    if (rem <= 0) { el.textContent = '00:00'; el.className = 'timer-display timer-danger'; return; }
    const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
    el.textContent = pad(m) + ':' + pad(s);
    const pct = rem/total;
    el.className = 'timer-display' + (pct<0.1?' timer-danger':pct<0.25?' timer-warning':'');
  };
  clearInterval(App.timers[elId]);
  App.timers[elId] = setInterval(tick, 1000);
  tick();
}

function startStopwatch(elId, startTime) {
  const tick = () => {
    const el = document.getElementById(elId);
    if (!el) { clearInterval(App.timers[elId]); return; }
    const elapsed = Date.now() - startTime;
    const m = Math.floor(elapsed/60000), s = Math.floor((elapsed%60000)/1000);
    el.textContent = pad(m) + ':' + pad(s);
  };
  clearInterval(App.timers[elId]);
  App.timers[elId] = setInterval(tick, 1000);
  tick();
}

function stopAllTimers() {
  for (const id of Object.keys(App.timers)) {
    clearInterval(App.timers[id]);
    delete App.timers[id];
  }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}
function formatDuration(ms) {
  if (!ms||ms<0) return '—';
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return m + 'm ' + (s%60) + 's';
}
function pad(n) { return String(n).padStart(2,'0'); }
function _updateTournamentCache(t) {
  const idx = App.tournaments.findIndex(tt => tt.id === t.id);
  if (idx !== -1) App.tournaments[idx] = t; else App.tournaments.push(t);
}

// Auto-refresh cada 30s cuando hay torneo abierto
setInterval(() => {
  if (App.currentTournamentId && (App.currentView==='organizer'||App.currentView==='spectator')) {
    refreshTournament();
  }
}, 30000);

init();
</script>
